        ];

        let currentFilter = '全部';     
        let currentEchoFilter = '全部'; 
        let sortDirection = null;

        function initEchoDropdown() {
            const uniqueEchos = [...new Set(initialData.map(item => item.echo))];
            const echoDropdown = document.getElementById('echoDropdown');
            let html = `<div class="px-4 py-2 text-base cursor-pointer hover:bg-blue-50" onclick="setEchoFilter('全部')">全部</div>`;
            uniqueEchos.forEach(echo => {
                html += `<div class="px-4 py-2 text-base cursor-pointer hover:bg-blue-50" onclick="setEchoFilter('${echo}')">${echo}</div>`;
            });
            echoDropdown.innerHTML = html;
        }

        function getAttrColor(attr) {
            const colors = {
                '衍射': 'bg-yellow-100 text-yellow-800',
                '熱熔': 'bg-red-100 text-red-800',
                '導電': 'bg-purple-100 text-purple-800',
                '冷凝': 'bg-blue-100 text-blue-800',
                '氣動': 'bg-teal-100 text-teal-800',
                '湮滅': 'bg-gray-200 text-gray-800',
            };
            return colors[attr] || 'bg-gray-100 text-gray-800';
        }

        function renderTable() {
            let data = [...initialData];

            if (currentFilter !== '全部') {
                data = data.filter(item => item.attr === currentFilter);
                document.getElementById('currentAttrLabel').innerText = currentFilter;
            } else {
                document.getElementById('currentAttrLabel').innerText = '屬性';
            }

            if (currentEchoFilter !== '全部') {
                data = data.filter(item => item.echo === currentEchoFilter);
                document.getElementById('currentEchoLabel').innerText = currentEchoFilter;
            } else {
                document.getElementById('currentEchoLabel').innerText = '聲骸';
            }

            if (currentFilter !== '全部' || currentEchoFilter !== '全部') {
                document.getElementById('clearFilterBtn').classList.remove('hidden');
            } else {
                document.getElementById('clearFilterBtn').classList.add('hidden');
            }

            const sortIcon = document.getElementById('sortIcon');
            if (sortDirection === 'asc') {
                data.sort((a, b) => a.stars - b.stars);
                sortIcon.innerText = '↑';
                sortIcon.classList.remove('opacity-50');
            } else if (sortDirection === 'desc') {
                data.sort((a, b) => b.stars - a.stars);
                sortIcon.innerText = '↓';
                sortIcon.classList.remove('opacity-50');
            } else {
                sortIcon.innerText = '↕';
                sortIcon.classList.add('opacity-50');
            }

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colSpan="10" class="p-8 text-center text-gray-500">沒有找到符合條件的資料</td></tr>`;
                return;
            }

            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = `border-b border-gray-100 hover:bg-gray-100 transition-colors ${index % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`;
                
                tr.innerHTML = `
                    <td class="p-4 font-medium text-center">${row.stars}</td>
                    <td class="p-4 font-bold whitespace-nowrap">${row.name}</td>
                    <td class="p-4 whitespace-nowrap">
                        <span class="px-2 py-1 rounded-md text-sm font-bold ${getAttrColor(row.attr)}">${row.attr}</span>
                    </td>
                    <td class="p-4 whitespace-nowrap">${row.echo}</td>
                    <td class="p-4 whitespace-nowrap">${row.cost4}</td>
                    <td class="p-4 whitespace-nowrap">${row.cost3_1}</td>
                    <td class="p-4 whitespace-nowrap">${row.cost3_2}</td>
                    <td class="p-4 whitespace-nowrap">${row.cost1_1}</td>
                    <td class="p-4 whitespace-nowrap">${row.cost1_2}</td>
                    <td class="p-4 text-sm text-gray-600 min-w-[300px] leading-relaxed">${row.sub}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function toggleSort() {
            if (sortDirection === null) sortDirection = 'desc';
            else if (sortDirection === 'desc') sortDirection = 'asc';
            else sortDirection = null;
            renderTable();
        }

        // 【修改重點 2】: 點擊打開選單時，動態幫表格加上 min-h-[320px] 撐開空間
        function toggleDropdown(e, dropdownId) {
            e.stopPropagation();
            
            const targetDropdown = document.getElementById(dropdownId);
            const isHidden = targetDropdown.classList.contains('hidden');
            const tableContainer = document.getElementById('tableContainer');
            
            // 先把所有的選單都關閉
            document.getElementById('attrDropdown').classList.add('hidden');
            document.getElementById('echoDropdown').classList.add('hidden');
            
            // 如果原本是隱藏的，就把它打開，並動態增加高度防止裁切
            if (isHidden) {
                targetDropdown.classList.remove('hidden');
                tableContainer.classList.add('min-h-[320px]'); 
            } else {
                tableContainer.classList.remove('min-h-[320px]');
            }
        }

        // 【修改重點 3】: 選擇完畢後，把動態高度移除
        function setFilter(attr) {
            currentFilter = attr;
            document.getElementById('attrDropdown').classList.add('hidden');
            document.getElementById('tableContainer').classList.remove('min-h-[320px]');
            renderTable();
        }

        function setEchoFilter(echo) {
            currentEchoFilter = echo;
            document.getElementById('echoDropdown').classList.add('hidden');
            document.getElementById('tableContainer').classList.remove('min-h-[320px]');
            renderTable();
        }

        document.getElementById('clearFilterBtn').addEventListener('click', () => {
            currentFilter = '全部';
            currentEchoFilter = '全部';
            renderTable();
        });

        // 【修改重點 4】: 點擊空白處關閉選單時，也把動態高度移除
        document.addEventListener('click', (e) => {
            document.getElementById('attrDropdown').classList.add('hidden');
            document.getElementById('echoDropdown').classList.add('hidden');
            document.getElementById('tableContainer').classList.remove('min-h-[320px]');
        });

        initEchoDropdown();
        renderTable();
    </script>
